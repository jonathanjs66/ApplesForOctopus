name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env <<EOF
          MONGO_USERNAME=admin
          MONGO_PASSWORD=OctopusAdmin2026!
          MONGO_DB=fruitsdb
          APP_PORT=3000
          APP_DB_USERNAME=fruits_app
          APP_DB_PASSWORD=OctopusApp2026!
          EOF

      - name: Build and start containers
        run: docker compose up --build -d

      - name: Wait for app to be healthy
        run: |
          for i in {1..15}; do
            curl -sf http://localhost/health && echo "App is up!" && exit 0
            echo "Waiting..."
            sleep 5
          done
          echo "App never became healthy" && exit 1

      - name: Test HTML page returns apple count
        run: |
          page="$(curl -fsS http://localhost/)"
          echo "$page" | grep -q "apples"
          echo "$page" | grep -q ">5<"
          echo "Homepage contains the apples count."

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -e

            cd ~/ApplesForOctopus

            git fetch origin
            git checkout main
            git reset --hard ${{ github.sha }}

            cat > .env <<EOF
            MONGO_USERNAME=${{ secrets.MONGO_USERNAME }}
            MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
            MONGO_DB=${{ secrets.MONGO_DB }}
            APP_PORT=${{ secrets.APP_PORT }}
            APP_DB_USERNAME=${{ secrets.APP_DB_USERNAME }}
            APP_DB_PASSWORD=${{ secrets.APP_DB_PASSWORD }}
            EOF

            set -a
            . ./.env
            set +a
            
            docker-compose down || true

            docker-compose up --build -d mongodb

            for i in {1..15}; do
              docker-compose exec -T mongodb mongosh -u "$MONGO_USERNAME" -p "$MONGO_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand('ping')" >/dev/null 2>&1 && break
              echo "Waiting for MongoDB..."
              sleep 5
            done

            docker-compose exec -T \
              -e MONGO_DB="$MONGO_DB" \
              -e APP_DB_USERNAME="$APP_DB_USERNAME" \
              -e APP_DB_PASSWORD="$APP_DB_PASSWORD" \
              mongodb \
              mongosh -u "$MONGO_USERNAME" -p "$MONGO_PASSWORD" --authenticationDatabase admin /opt/mongo/ensure-app-user.js

            docker-compose up --build -d app nginx

            for i in {1..15}; do
              curl -sf http://localhost/health && break
              echo "Waiting for deployed app..."
              sleep 5
            done

            page="$(curl -fsS http://localhost/)"
            echo "$page" | grep -q "apples"
            echo "$page" | grep -q ">5<"
            docker-compose ps
